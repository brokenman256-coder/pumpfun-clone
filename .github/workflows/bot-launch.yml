name: Bot launch (real on-chain coin)

on:
  schedule:
    # GitHub's practical minimum for scheduled workflows.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-save @solana/web3.js @solana/spl-token
      - run: node scripts/bot-launch.mjs
        env:
          BOT_WALLET_SECRET: ${{ secrets.BOT_WALLET_SECRET }}
          RPC_URL: ${{ vars.LAUNCHPAD_RPC_URL }}
          LAUNCHPAD_PROGRAM_ID: ${{ vars.LAUNCHPAD_PROGRAM_ID }}
          FEE_RECIPIENT: ${{ vars.FEE_RECIPIENT }}
